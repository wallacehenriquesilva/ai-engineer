name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-skills:
    name: Validate Skills & Commands
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run skill validation
        run: bash tests/test-skills.sh

  test-execution-log:
    name: Test Execution Log
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run execution-log tests
        run: bash tests/test-execution-log.sh

  build-go:
    name: Build Knowledge Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        working-directory: knowledge-service
        run: go build ./...

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck on scripts
        run: |
          find scripts/ -name "*.sh" -exec shellcheck -S warning {} +
