services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge}
      POSTGRES_USER: ${POSTGRES_USER:-aieng}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aieng}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aieng -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 10

  knowledge-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-aieng}:${POSTGRES_PASSWORD:-aieng}@postgres:5432/${POSTGRES_DB:-knowledge}?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

  org-watch:
    build:
      context: ../
      dockerfile: knowledge-service/Dockerfile.watch
    restart: "no"
    env_file:
      - ../.env
    environment:
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8080
    depends_on:
      - knowledge-service
    profiles:
      - watch

volumes:
  pgdata:
